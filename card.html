<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
</head>
<body>
    <style>
    .card {
      padding: 15px;
      max-width: 100%;
      width: 800px;
      margin: 0 auto;
      display: block;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      text-align: center;
      border: 6px solid #a91af0;
      box-shadow:
        0 0 0 3px #fb3f4c,
        0 0 0 6px #a91af0;
      background: #eee4ae;
      background: radial-gradient(circle, rgba(238, 228, 174, 1) 0%, rgba(148, 187, 233, 0.9) 100%);
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
      border: 6px solid #0e0c0c;
      border-radius: 15px;
      box-shadow:
      0 0 0 3px #7c7c7c,
      0 0 0 6px #2b1735;
    }
    .img {
      width: 40%;
      height: auto;
      border-radius: 7px;
      display: block;
    }
    .descricao {
      font-style: oblique;
      font-size: 18px;
      color: #333;
      margin-top: 10px;
    }
    .caracteristicas {
      font-style: oblique;
      font-size: 16px;
      color: #333;
      margin-top: 10px;
      background: rgba(251, 63, 76, 0.08);
      border-radius: 8px;
      padding: 8px
    }
    .caracteristicas h2 {
      font-size: 16px;
      color: #fb3f4c;
      margin-bottom: 6px;
    }
    .habilidades {
      font-style: oblique;
      font-size: 20px;
      color: #333;
      margin-top: 20px;
      background: rgba(169, 26, 240, 0.08);
      border-radius: 8px;
      padding: 8px
    }
    .habilidades h2 {
      font-size: 16px;
      color: #a91af0;
      margin-bottom: 6px;
    }
    .titulo h1 {
      font-size: 24px;
      color: #fb3f4c;
      margin-top: 10px;
    }
    .descricao p {
      font-style: oblique;
      font-size: 18px;
      color: #333;
      margin-top: 10px;
    }
    </style>

    <main class="container">
  <section class="card">
    <img src="frieren.jpg" alt="Imagem do personagem">
    <h1>Frieren, a Assasina</h1>
    <p class="descricao">Uma maga lendária, conhecida por ajudar a derrotar o Rei Demônio.</p>
    <div class="habilidades">
      <h2>Magias</h2>
      <ul>
        <li>Zoltraak</li>
        <li>Judradjim</li>
        <li>Auge da Magia</li>
      </ul>
    </div>
    <div class="caracteristicas">
      <h2>Características</h2>
      <p><strong>Classe:</strong> Mago</p>
      <p><strong>Nível:</strong> +999</p>
      <p><strong>Elemento:</strong> Magia</p>
    </div>
  </section>
</main>
</head>
</body>
</html>
