<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
</head>
<body>
    <style>
    .card {
      background-color: #d6eff7;
      border-radius: 10px, #03c0ff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 800px;
      padding: 20px;
      text-align: center;
    }
    .img
    {
      width: 100%;
      height: auto;
      border-radius: 10px;
    }
    .descricao {
      font-style: oblique;
      font-size: 18px;
      color: #333;
      margin-top: 10px;
    }
    .habilidades {
      font-style: oblique;
      font-size: 20px;
      color: #333;
      margin-top: 20px;
    }
    .caracteristicas {
      font-style: oblique;
      font-size: 16px;
      color: #333;
      margin-top: 10px;
    }

    </style>

    <main class="container">
  <section class="card">
    <img src="frieren.jpg" alt="Imagem do personagem">
    <h1>Frieren, a Assasina</h1>
    <p class="descricao">Uma maga lendária, conhecida por ajudar a derrotar o Rei Demônio.</p>
    <div class="habilidades">
      <h2>Magias</h2>
      <ul>
        <li>Zoltraak</li>
        <li>Judradjim</li>
        <li>Auge da Magia</li>
      </ul>
    </div>
    <div class="caracteristicas">
      <h2>Características</h2>
      <p><strong>Classe:</strong> Mago</p>
      <p><strong>Nível:</strong> 999</p>
      <p><strong>Elemento:</strong> Magia</p>
    </div>
  </section>
</main>
</head>
<body>
    
</body>
</html>
